apiVersion: v1
kind: Pod
metadata:
  name: zap-scan
  namespace: aeon
spec:
  restartPolicy: Never
  containers:
    - name: zap
      image: ghcr.io/zaproxy/zaproxy:stable
      imagePullPolicy: IfNotPresent
      command:
        - zap-baseline.py
        - -t
        - "http://aeon.aeon.svc.cluster.local:4471/"
        - -J
        - zap-report.json
        - -w
        - zap-report.md
        - -r
        - zap-report.html
      volumeMounts:
        - name: reports
          mountPath: /zap/wrk
    - name: helper
      image: busybox:latest
      imagePullPolicy: IfNotPresent
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: reports
          mountPath: /zap/wrk
  volumes:
    - name: reports
      emptyDir: {}
