# Aeon Helm Chart — Default Values

replicaCount: 1

image:
  repository: aeonrust/aeon
  tag: latest
  pullPolicy: IfNotPresent

# Pull secrets for private registries (e.g. DOCR)
imagePullSecrets: []
#  - name: rust-proxy-registry

# Aeon configuration
config:
  # REST API listen address
  apiAddr: "0.0.0.0:4471"
  # Kafka/Redpanda brokers
  brokers: "redpanda:9092"
  # Log level
  logLevel: info
  # Artifact storage directory (inside the container)
  artifactDir: /app/artifacts

# Ports
#   quic         (4470/UDP): cluster inter-node QUIC (Raft/PoH, mTLS). Internal only.
#   api          (4471/TCP): REST API + T4 WebSocket + /metrics (Prometheus scrape).
#   webtransport (4472/UDP): T3 WebTransport + external QUIC connectors (data plane).
ports:
  quic: 4470
  api: 4471
  webtransport: 4472

# Service configuration
service:
  type: ClusterIP
  annotations: {}

# Resource limits
resources:
  requests:
    cpu: 500m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 1Gi

# Persistence for artifacts and state
persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi

# Processor artifacts via ConfigMap (for .wasm files)
processors:
  configMap: ""  # Name of ConfigMap containing .wasm files

# Multi-node cluster mode (StatefulSet + Raft consensus)
cluster:
  enabled: false
  replicas: 3
  partitions: 16
  # G11.a — PoH chain verification policy on CL-6b partition-transfer install.
  # Empty string = use binary default ("verify"). Operator override, rarely
  # set. Valid values: verify | verify_with_key | trust_extend.
  pohVerifyMode: ""
  # G11.b — name of the single pipeline this node's partition-transfer driver
  # handles. Must match the pipeline created via REST. If unset, no transfer
  # driver is spawned and Raft-committed Transferring rows stay stuck.
  pipelineName: ""
  # G11.b — filesystem root for L2 body segments received during transfer.
  # Empty = aeon-cli default (`<artifactDir>/l2body`). Point at a PVC mount
  # for durable segments across pod restarts.
  l2Root: ""
  tls:
    enabled: false
    secretName: aeon-tls  # K8s Secret with tls.crt, tls.key, ca.crt
  # G14 — Raft timing overrides. Leave all three empty (or omit) to use the
  # binary default (500/1500/3000 ms). Set all three for a custom preset;
  # validation rejects partial overrides and values that violate
  # heartbeat < election_min < election_max. Recommended presets:
  #   fast_failover     : 250  /  750  / 2000   (<5 s target, reliable VPC)
  #   prod_recommended  : 500  / 2000  / 6000   (wider jitter, ~5 s failover)
  #   flaky_network     : 500  / 3000  / 12000  (congested / cross-region)
  raftTiming:
    heartbeatMs: ""
    electionMinMs: ""
    electionMaxMs: ""

# Graceful shutdown budget. Aeon's SIGINT/SIGTERM handler flips /ready=503,
# runs leader-relinquish + endpoint-propagation sleep in parallel, stops
# running pipelines (SPSC drain + sink flush), and shuts down the Raft
# node. terminationGracePeriod must cover all of that or kubelet sends
# SIGKILL.
#
# G14: `leaderRelinquishMs` is how long the handler waits for Raft
# leadership to move to a follower. Runs concurrently with the preStop
# sleep, so no additional grace period is needed when this is less than
# or equal to `preStopDelaySeconds * 1000`.
gracefulShutdown:
  terminationGracePeriodSeconds: 90
  preStopDelaySeconds: 5
  leaderRelinquishMs: 4000

# Pod disruption policy (ROADMAP B3). Caps voluntary disruption (drain,
# node upgrade, cluster-autoscaler scale-down) so Raft quorum is preserved.
#
# The K8s object kind is `PodDisruptionBudget` (fixed by the API); in
# Aeon-owned surfaces we call it the "pod disruption policy" to match
# the project's Capacity-not-Budget convention.
#
# Default (when enabled and neither minAvailable nor maxUnavailable is
# set) computes `floor(N/2) + 1` — the Raft quorum floor — from
# cluster.replicas (cluster mode), autoscaling.minReplicas (HPA mode),
# or replicaCount. Override either field to pin an absolute cap; set
# only one of the two (K8s forbids both).
podDisruption:
  enabled: false
  # Absolute number, string ("2"), or percentage ("60%"). Empty = auto.
  minAvailable: ""
  # Mutually exclusive with minAvailable. Absolute or percentage.
  maxUnavailable: ""

# Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilization: 70
  targetMemoryUtilization: ""  # empty = disabled
  scaleUpStabilization: 60     # seconds before allowing another scale-up
  scaleDownStabilization: 300  # seconds before allowing scale-down
  scaleUpMaxPods: 2            # max pods to add per scale-up period

# Node selector / tolerations / affinity
nodeSelector: {}
tolerations: []
affinity: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
