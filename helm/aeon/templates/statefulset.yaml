{{- if .Values.cluster.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: aeon
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: {{ .Release.Name }}-headless
  replicas: {{ .Values.cluster.replicas }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: aeon
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aeon
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: aeon
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: RUST_LOG
              value: {{ .Values.config.logLevel | quote }}
            - name: AEON_API_ADDR
              value: {{ .Values.config.apiAddr | quote }}
            - name: AEON_BROKERS
              value: {{ .Values.config.brokers | quote }}
            - name: AEON_ARTIFACT_DIR
              value: {{ .Values.config.artifactDir | quote }}
            # Cluster identity — derived from pod name (aeon-0, aeon-1, etc.)
            - name: AEON_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AEON_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: AEON_CLUSTER_ENABLED
              value: "true"
            - name: AEON_CLUSTER_REPLICAS
              value: {{ .Values.cluster.replicas | quote }}
            - name: AEON_CLUSTER_SERVICE
              value: "{{ .Release.Name }}-headless"
            - name: AEON_CLUSTER_PARTITIONS
              value: {{ .Values.cluster.partitions | quote }}
            - name: AEON_CLUSTER_QUIC_PORT
              value: {{ .Values.ports.quic | quote }}
          ports:
            - name: quic
              containerPort: {{ .Values.ports.quic }}
              protocol: UDP
            - name: api
              containerPort: {{ .Values.ports.api }}
              protocol: TCP
            - name: webtransport
              containerPort: {{ .Values.ports.webtransport }}
              protocol: UDP
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: artifacts
              mountPath: /app/artifacts
            {{- if .Values.processors.configMap }}
            - name: processors
              mountPath: /app/processors
              readOnly: true
            {{- end }}
            {{- if .Values.cluster.tls.enabled }}
            - name: tls
              mountPath: /app/tls
              readOnly: true
            {{- end }}
      volumes:
        {{- if .Values.processors.configMap }}
        - name: processors
          configMap:
            name: {{ .Values.processors.configMap }}
        {{- end }}
        {{- if .Values.cluster.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.cluster.tls.secretName }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Anti-affinity: spread pods across nodes for fault tolerance
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: aeon
                    app.kubernetes.io/instance: {{ .Release.Name }}
                topologyKey: kubernetes.io/hostname
        {{- with .Values.affinity }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
    - metadata:
        name: artifacts
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: 5Gi
{{- end }}
