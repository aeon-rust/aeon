{{- if .Values.cluster.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: aeon
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: {{ .Release.Name }}-headless
  replicas: {{ .Values.cluster.replicas }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: aeon
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aeon
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.gracefulShutdown.terminationGracePeriodSeconds }}
      containers:
        - name: aeon
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: RUST_LOG
              value: {{ .Values.config.logLevel | quote }}
            - name: AEON_API_ADDR
              value: {{ .Values.config.apiAddr | quote }}
            - name: AEON_BROKERS
              value: {{ .Values.config.brokers | quote }}
            - name: AEON_ARTIFACT_DIR
              value: {{ .Values.config.artifactDir | quote }}
            # Cluster identity — derived from pod name (aeon-0, aeon-1, etc.)
            - name: AEON_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: AEON_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: AEON_CLUSTER_ENABLED
              value: "true"
            - name: AEON_CLUSTER_REPLICAS
              value: {{ .Values.cluster.replicas | quote }}
            - name: AEON_CLUSTER_SERVICE
              value: "{{ .Release.Name }}-headless"
            - name: AEON_CLUSTER_PARTITIONS
              value: {{ .Values.cluster.partitions | quote }}
            - name: AEON_CLUSTER_QUIC_PORT
              value: {{ .Values.ports.quic | quote }}
            {{- if .Values.cluster.pohVerifyMode }}
            - name: AEON_CLUSTER_POH_VERIFY_MODE
              value: {{ .Values.cluster.pohVerifyMode | quote }}
            {{- end }}
            {{- if .Values.cluster.pipelineName }}
            # G11.b — selects the single pipeline that the partition-transfer
            # driver installs segments + PoH chains for on this node. Unset
            # skips driver spawn (transfers won't progress).
            - name: AEON_PIPELINE_NAME
              value: {{ .Values.cluster.pipelineName | quote }}
            {{- end }}
            {{- if .Values.cluster.l2Root }}
            - name: AEON_L2_ROOT
              value: {{ .Values.cluster.l2Root | quote }}
            {{- end }}
            {{- if .Values.cluster.raftTiming.heartbeatMs }}
            - name: AEON_RAFT_HEARTBEAT_MS
              value: {{ .Values.cluster.raftTiming.heartbeatMs | quote }}
            {{- end }}
            {{- if .Values.cluster.raftTiming.electionMinMs }}
            - name: AEON_RAFT_ELECTION_MIN_MS
              value: {{ .Values.cluster.raftTiming.electionMinMs | quote }}
            {{- end }}
            {{- if .Values.cluster.raftTiming.electionMaxMs }}
            - name: AEON_RAFT_ELECTION_MAX_MS
              value: {{ .Values.cluster.raftTiming.electionMaxMs | quote }}
            {{- end }}
            # G14 — how long the SIGTERM handler waits for Raft leadership to
            # flip to a follower before proceeding with the drain. Runs in
            # parallel with the `AEON_PRESTOP_DELAY_SECS` endpoint-propagation
            # sleep, so the hand-off mostly hides inside that window.
            # Target: fast_failover preset → 4 s covers 2× election_max_ms.
            - name: AEON_LEADER_RELINQUISH_MS
              value: {{ .Values.gracefulShutdown.leaderRelinquishMs | default 4000 | quote }}
            # Controls the pre-drain pause in aeon's SIGINT/SIGTERM handler.
            # Keep this in sync with gracefulShutdown.preStopDelaySeconds so
            # the handler waits for endpoint propagation before stopping
            # sources. The StatefulSet's preStop hook gives kubelet the same
            # window before it forwards SIGTERM to the container process.
            - name: AEON_PRESTOP_DELAY_SECS
              value: {{ .Values.gracefulShutdown.preStopDelaySeconds | quote }}
          lifecycle:
            preStop:
              exec:
                # Small delay so kube-proxy / service endpoints observe the
                # pod as Terminating before the container receives SIGTERM.
                # Aeon's in-process signal handler performs its own drain —
                # this hook only bridges the iptables update window.
                command: ["/bin/sh", "-c", "sleep {{ .Values.gracefulShutdown.preStopDelaySeconds }}"]
          ports:
            - name: quic
              containerPort: {{ .Values.ports.quic }}
              protocol: UDP
            - name: api
              containerPort: {{ .Values.ports.api }}
              protocol: TCP
            - name: webtransport
              containerPort: {{ .Values.ports.webtransport }}
              protocol: UDP
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: artifacts
              mountPath: /app/artifacts
            {{- if .Values.processors.configMap }}
            - name: processors
              mountPath: /app/processors
              readOnly: true
            {{- end }}
            {{- if .Values.cluster.tls.enabled }}
            - name: tls
              mountPath: /app/tls
              readOnly: true
            {{- end }}
      volumes:
        {{- if .Values.processors.configMap }}
        - name: processors
          configMap:
            name: {{ .Values.processors.configMap }}
        {{- end }}
        {{- if .Values.cluster.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.cluster.tls.secretName }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # Anti-affinity: spread pods across nodes for fault tolerance
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: aeon
                    app.kubernetes.io/instance: {{ .Release.Name }}
                topologyKey: kubernetes.io/hostname
        {{- with .Values.affinity }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
    - metadata:
        name: artifacts
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: 5Gi
{{- end }}
