{{- if not .Values.cluster.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: aeon
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: aeon
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aeon
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: aeon
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve"]
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: RUST_LOG
              value: {{ .Values.config.logLevel | quote }}
            - name: AEON_API_ADDR
              value: {{ .Values.config.apiAddr | quote }}
            - name: AEON_BROKERS
              value: {{ .Values.config.brokers | quote }}
            - name: AEON_ARTIFACT_DIR
              value: {{ .Values.config.artifactDir | quote }}
          ports:
            - name: quic
              containerPort: {{ .Values.ports.quic }}
              protocol: UDP
            - name: api
              containerPort: {{ .Values.ports.api }}
              protocol: TCP
            - name: webtransport
              containerPort: {{ .Values.ports.webtransport }}
              protocol: UDP
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: api
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: artifacts
              mountPath: /app/artifacts
            {{- if .Values.processors.configMap }}
            - name: processors
              mountPath: /app/processors
              readOnly: true
            {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: artifacts
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-artifacts
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.processors.configMap }}
        - name: processors
          configMap:
            name: {{ .Values.processors.configMap }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
