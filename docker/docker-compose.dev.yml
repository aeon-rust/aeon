# Aeon Dev — Minimal development environment
# Started by: aeon dev up
# Includes only Redpanda + Console for Scenario 1 development.

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.12
    container_name: aeon-dev-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
      - --smp 1
      - --default-log-level=warn
    ports:
      - "19092:19092"
      - "18082:18082"
      - "18081:18081"
    volumes:
      - aeon-dev-redpanda:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aeon-dev

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    container_name: aeon-dev-console
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
    networks:
      - aeon-dev

  # Create default topics for development
  init-topics:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.12
    container_name: aeon-dev-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: /bin/bash
    command: >
      -c "
      rpk topic create aeon-source -p 4 --brokers redpanda:9092 &&
      rpk topic create aeon-sink -p 4 --brokers redpanda:9092 &&
      rpk topic create aeon-dlq -p 1 --brokers redpanda:9092 &&
      echo 'Dev topics created'
      "
    networks:
      - aeon-dev

networks:
  aeon-dev:
    name: aeon-dev
    driver: bridge

volumes:
  aeon-dev-redpanda:
